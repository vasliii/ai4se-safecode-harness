stages:
  - test

unit-test:
  image: python:3.11
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e .[dev]
  script:
    - pytest --cov=safecode --cov-report=term --cov-report=xml:coverage.xml --junitxml=junit.xml --cov-fail-under=80
  artifacts:
    when: always
    paths:
      - coverage.xml
      - junit.xml
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
